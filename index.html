<script>
    document.getElementById("load-btn").addEventListener("click", async () => {
        try {
            const response = await fetch("problem.json");
            const problem = await response.json();

            // This updated logic handles your new structure
            let html = `<h2>${problem.title}</h2><p>${problem.instructions}</p>`;
            
            html += "<h3>Given examples:</h3><ul>";
            problem.examples.forEach(ex => {
                html += `<li><strong>${ex.underlying}</strong> → <strong>${ex.surface}</strong></li>`;
            });
            html += "</ul>";

            // Add unknowns if they exist
            if (problem.unknowns && problem.unknowns.length > 0) {
                html += "<h3>Unknowns to solve:</h3><ul>";
                problem.unknowns.forEach(u => {
                    html += `<li><strong>${u.underlying}</strong> → ?</li>`;
                });
                html += "</ul>";
            }

            document.getElementById("problem-area").innerHTML = html;
        } catch (error) {
            document.getElementById("problem-area").innerHTML = 
                "<p style='color:red;'>Error loading problem. Check console for details.</p>";
            console.error(error);
        }
    });
</script>
