<!DOCTYPE html>
<html>
<head><title>NACLO Debug</title></head>
<body>
    <h1>NACLO Debugger</h1>
    <button onclick="runTest()">Click to Load</button>
    <div id="status">Status: Waiting...</div>
    <div id="problem-area"></div>

    <script>
        async function runTest() {
            const status = document.getElementById("status");
            const area = document.getElementById("problem-area");
            status.innerHTML = "Status: Starting...";
            
            try {
                status.innerHTML = "Status: Fetching...";
                const response = await fetch("problem.json");
                status.innerHTML = "Status: Fetch OK. Parsing...";
                const data = await response.json();
                status.innerHTML = "Status: JSON Loaded!";
                
                // If it gets here, show the title
                area.innerHTML = "<h2>" + data.title + "</h2>";
            } catch (err) {
                status.innerHTML = "Status: FAILED. Error: " + err.message;
            }
        }
    </script>
</body>
</html>
