    <script>
        (function() {
            const init = () => {
                const btn = document.getElementById("load-btn");
                btn.addEventListener("click", async () => {
                    try {
                        const response = await fetch("problem.json");
                        const data = await response.json();
                        
                        // Build the full problem display
                        let html = `<h2>${data.title}</h2><p>${data.instructions}</p>`;
                        
                        html += "<h3>Examples:</h3><ul>";
                        data.examples.forEach(ex => {
                            html += `<li>${ex.underlying} → <strong>${ex.surface}</strong></li>`;
                        });
                        html += "</ul>";
                        
                        html += "<h3>Unknowns:</h3><ul>";
                        data.unknowns.forEach(u => {
                            html += `<li>${u.underlying} → ?</li>`;
                        });
                        html += "</ul>";
                        
                        document.getElementById("problem-area").innerHTML = html;
                    } catch (e) {
                        document.getElementById("problem-area").innerHTML = "Error: " + e.message;
                    }
                });
            };

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
