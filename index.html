<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NACLO Practice</title>
</head>
<body>
    <h1>NACLO Practice</h1>
    <button id="load-btn">Load problem</button>
    <div id="problem-area"></div>

    <script>
        // Wait for the HTML to be fully loaded
        document.addEventListener('DOMContentLoaded', () => {
            const btn = document.getElementById("load-btn");
            
            btn.addEventListener("click", async () => {
                try {
                    const response = await fetch("problem.json");
                    const problem = await response.json();
                    
                    let html = `<h2>${problem.title}</h2><p>${problem.instructions}</p>`;
                    document.getElementById("problem-area").innerHTML = html;
                } catch (err) {
                    document.getElementById("problem-area").innerHTML = "Error loading problem: " + err;
                }
            });
        });
    </script>
</body>
</html>
