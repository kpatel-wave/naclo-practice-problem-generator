    <script>
        async function loadMyProblem() {
            try {
                const response = await fetch("problem.json");
                const data = await response.json();
                
                // 1. Start with Title and Instructions
                let html = `<h2>${data.title}</h2><p>${data.instructions}</p>`;
                
                // 2. Add Examples
                html += "<h3>Examples:</h3><ul>";
                data.examples.forEach(ex => {
                    html += `<li>${ex.underlying} → <strong>${ex.surface}</strong></li>`;
                });
                html += "</ul>";
                
                // 3. Add Unknowns
                html += "<h3>Unknowns:</h3><ul>";
                data.unknowns.forEach(u => {
                    html += `<li>${u.underlying} → ?</li>`;
                });
                html += "</ul>";
                
                document.getElementById("problem-area").innerHTML = html;
            } catch (err) {
                document.getElementById("problem-area").innerHTML = "Error: " + err;
            }
        }
    </script>
