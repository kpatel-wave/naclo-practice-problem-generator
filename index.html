<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NACLO Practice</title>
</head>
<body>
    <h1>NACLO Practice</h1>
    <button id="load-btn">Load problem</button>
    <div id="problem-area"></div>

    <script>
        // Use an IIFE (Immediately Invoked Function Expression)
        (function() {
            const init = () => {
                const btn = document.getElementById("load-btn");
                if (!btn) {
                    console.error("Button not found!");
                    return;
                }
                btn.addEventListener("click", async () => {
                    try {
                        const response = await fetch("problem.json");
                        const data = await response.json();
                        document.getElementById("problem-area").innerHTML = "<h2>" + data.title + "</h2>";
                    } catch (e) {
                        document.getElementById("problem-area").innerHTML = "Error: " + e.message;
                    }
                });
            };

            // This is a "double-check" wait
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
