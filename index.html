<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NACLO Practice</title>
</head>
<body>
    <h1>NACLO Practice</h1>
    <button id="load-btn">Load problem</button>
    <div id="problem-area"></div>

    <script>
        // The script is placed AFTER the button in the HTML, 
        // so the button is guaranteed to exist.
        const btn = document.getElementById("load-btn");
        
        btn.addEventListener("click", async () => {
            console.log("Loading problem...");
            try {
                const response = await fetch("problem.json");
                const data = await response.json();
                console.log("Data:", data);
                
                let html = `<h2>${data.title}</h2><p>${data.instructions}</p>`;
                document.getElementById("problem-area").innerHTML = html;
            } catch (err) {
                console.error("Error:", err);
                document.getElementById("problem-area").innerHTML = "Error: " + err.message;
            }
        });
    </script>
</body>
</html>
